"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
format = "$directory$character"
scan_timeout = 10

[directory]
format = "[$path]($style) "
style = "bold blue"
truncate_to_repo = false
truncation_length = 1

[character]
error_symbol = "[❯](bold red)"
success_symbol = "[❯](bold green)"
